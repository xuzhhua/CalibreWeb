<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibre Web - 欢迎</title>    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            color: white;
            max-width: 800px;
            padding: 40px;
        }

        .hero h1 {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 24px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .cta-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background: white;
            color: #667eea;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-top: 60px;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .feature h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .feature p {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>📚 Calibre Web</h1>
        <p>优雅、现代化的个人数字图书馆管理系统</p>
        
        <div class="cta-buttons">
            <a href="/login" class="btn btn-primary">登录</a>
            <a href="/register" class="btn btn-secondary">注册</a>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔐</div>
                <h3>用户管理</h3>
                <p>安全的用户认证系统</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🔍</div>
                <h3>智能搜索</h3>
                <p>快速查找您的图书</p>
            </div>
            <div class="feature">
                <div class="feature-icon">✏️</div>
                <h3>完整管理</h3>
                <p>添加、编辑、删除图书</p>
            </div>
            <div class="feature">
                <div class="feature-icon">🎨</div>
                <h3>美观界面</h3>
                <p>现代化的用户体验</p>
            </div>
        </div>
    </div>
</body>
</html>
