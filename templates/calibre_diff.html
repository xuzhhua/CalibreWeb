<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibre 书库差异分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .book-list {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .book-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .book-item:hover {
            background: #f9f9f9;
        }
        
        .book-info {
            flex: 1;
        }
        
        .book-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .book-author {
            color: #666;
            font-size: 14px;
        }
        
        .book-meta {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .badge.missing {
            background: #fee;
            color: #c00;
        }
        
        .badge.ok {
            background: #efe;
            color: #0a0;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button.primary {
            background: #667eea;
            color: white;
        }
        
        button.primary:hover {
            background: #5568d3;
        }
        
        button.danger {
            background: #e74c3c;
            color: white;
        }
        
        button.danger:hover {
            background: #c0392b;
        }
        
        button.secondary {
            background: #95a5a6;
            color: white;
        }
        
        button.secondary:hover {
            background: #7f8c8d;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .progress-container {
            max-width: 600px;
            margin: 20px auto;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .progress-steps {
            list-style: none;
            padding: 0;
        }
        
        .progress-step {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-step.active {
            background: #e8f0fe;
            border-left: 3px solid #667eea;
        }
        
        .progress-step.completed {
            background: #e8f5e9;
            border-left: 3px solid #4caf50;
        }
        
        .step-icon {
            font-size: 20px;
        }
        
        .step-text {
            flex: 1;
            color: #333;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .checkbox-wrapper {
            margin-right: 15px;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .btn-back {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <button class="btn-back" onclick="goBack()">
                <span>←</span>
                <span>返回仪表板</span>
            </button>
            <h1 style="margin: 0; flex: 1; text-align: center;">📚 Calibre 书库差异分析</h1>
            <div style="width: 120px;"></div> <!-- 占位保持居中 -->
        </div>
        
        <div id="loading" class="loading">
            <h2>📊 正在分析书库差异</h2>
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%">0%</div>
                </div>
                <ul class="progress-steps">
                    <li class="progress-step" id="step-1">
                        <span class="step-icon">⏳</span>
                        <span class="step-text">连接 Calibre 数据库</span>
                    </li>
                    <li class="progress-step" id="step-2">
                        <span class="step-icon">📚</span>
                        <span class="step-text">读取 Calibre 书籍信息</span>
                    </li>
                    <li class="progress-step" id="step-3">
                        <span class="step-icon">💾</span>
                        <span class="step-text">读取本地数据库信息</span>
                    </li>
                    <li class="progress-step" id="step-4">
                        <span class="step-icon">🔍</span>
                        <span class="step-text">对比分析差异</span>
                    </li>
                    <li class="progress-step" id="step-5">
                        <span class="step-icon">📋</span>
                        <span class="step-text">生成分析报告</span>
                    </li>
                </ul>
            </div>
        </div>
        
        <div id="content" style="display: none;">
            <!-- 统计摘要 -->
            <div class="summary">
                <div class="stat-card">
                    <h3>Calibre书库</h3>
                    <div class="number" id="calibre-total">0</div>
                </div>
                <div class="stat-card">
                    <h3>本地数据库</h3>
                    <div class="number" id="local-total">0</div>
                </div>
                <div class="stat-card">
                    <h3>待导入</h3>
                    <div class="number" id="to-import">0</div>
                </div>
                <div class="stat-card">
                    <h3>待更新</h3>
                    <div class="number" id="to-update">0</div>
                </div>
                <div class="stat-card">
                    <h3>已删除</h3>
                    <div class="number" id="orphaned">0</div>
                </div>
            </div>
            
            <!-- 待导入的书籍 -->
            <div class="section">
                <h2>📥 待导入的书籍（只在Calibre中）</h2>
                <div id="new-books-list" class="book-list"></div>
                <div class="actions">
                    <button class="primary" onclick="importSelected('import_new')">
                        导入选定的书籍
                    </button>
                    <button class="secondary" onclick="selectAll('new')">全选</button>
                </div>
            </div>
            
            <!-- 需要更新的书籍 -->
            <div class="section">
                <h2>🔄 需要更新的书籍（信息不完整）</h2>
                <div id="incomplete-books-list" class="book-list"></div>
                <div class="actions">
                    <button class="primary" onclick="importSelected('update_incomplete')">
                        更新选定的书籍
                    </button>
                    <button class="secondary" onclick="selectAll('incomplete')">全选</button>
                </div>
            </div>
            
            <!-- 孤立的书籍 -->
            <div class="section">
                <h2>🗑️ 孤立的书籍（只在本地数据库中）</h2>
                <div id="orphaned-books-list" class="book-list"></div>
                <div class="actions">
                    <button class="danger" onclick="importSelected('remove_orphaned')">
                        删除选定的书籍
                    </button>
                    <button class="secondary" onclick="selectAll('orphaned')">全选</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let diffData = null;
        
        // 模拟进度更新
        function updateProgress(step, percentage) {
            const progressFill = document.getElementById('progress-fill');
            progressFill.style.width = percentage + '%';
            progressFill.textContent = percentage + '%';
            
            // 更新步骤状态
            for (let i = 1; i <= 5; i++) {
                const stepElement = document.getElementById('step-' + i);
                stepElement.classList.remove('active', 'completed');
                
                if (i < step) {
                    stepElement.classList.add('completed');
                    stepElement.querySelector('.step-icon').textContent = '✅';
                } else if (i === step) {
                    stepElement.classList.add('active');
                    stepElement.querySelector('.step-icon').innerHTML = '<span class="spinner"></span>';
                }
            }
        }
        
        async function loadDiff() {
            try {
                // 步骤1: 连接数据库
                updateProgress(1, 10);
                await new Promise(resolve => setTimeout(resolve, 300));
                
                // 步骤2: 读取Calibre
                updateProgress(2, 30);
                await new Promise(resolve => setTimeout(resolve, 300));
                
                // 步骤3: 读取本地数据库
                updateProgress(3, 50);
                await new Promise(resolve => setTimeout(resolve, 300));
                
                // 步骤4: 对比分析
                updateProgress(4, 70);
                await new Promise(resolve => setTimeout(resolve, 300));
                
                // 步骤5: 生成报告
                updateProgress(5, 90);
                
                const response = await fetch('/api/calibre/diff');
                const data = await response.json();
                
                if (!response.ok) {
                    alert('加载失败: ' + (data.error || '未知错误'));
                    return;
                }
                
                diffData = data;
                
                // 完成
                updateProgress(6, 100);
                document.getElementById('step-5').classList.remove('active');
                document.getElementById('step-5').classList.add('completed');
                document.getElementById('step-5').querySelector('.step-icon').textContent = '✅';
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                renderDiff(data);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }
        
        function renderDiff(data) {
            // 更新统计
            document.getElementById('calibre-total').textContent = data.summary.calibre_total;
            document.getElementById('local-total').textContent = data.summary.local_total;
            document.getElementById('to-import').textContent = data.summary.only_in_calibre;
            document.getElementById('to-update').textContent = data.summary.incomplete;
            document.getElementById('orphaned').textContent = data.summary.only_in_local;
            
            // 渲染待导入的书籍
            renderBookList('new-books-list', data.only_in_calibre, 'calibre_id', 'new');
            
            // 渲染需要更新的书籍
            renderIncompleteBooks('incomplete-books-list', data.incomplete_books);
            
            // 渲染孤立的书籍
            renderBookList('orphaned-books-list', data.only_in_local, 'id', 'orphaned');
        }
        
        function renderBookList(containerId, books, idField, category) {
            const container = document.getElementById(containerId);
            
            if (books.length === 0) {
                container.innerHTML = '<div class="empty">没有书籍</div>';
                return;
            }
            
            container.innerHTML = books.map(book => `
                <div class="book-item">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" data-id="${book[idField]}" data-category="${category}">
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">作者：${book.author}</div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderIncompleteBooks(containerId, books) {
            const container = document.getElementById(containerId);
            
            if (books.length === 0) {
                container.innerHTML = '<div class="empty">所有书籍信息完整</div>';
                return;
            }
            
            container.innerHTML = books.map(book => `
                <div class="book-item">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" data-id="${book.id}" data-category="incomplete">
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title}</div>
                        <div class="book-author">作者：${book.author}</div>
                        <div class="book-meta">
                            ${book.has_cover ? '<span class="badge ok">有封面</span>' : '<span class="badge missing">缺封面</span>'}
                            ${book.has_file ? '<span class="badge ok">有文件</span>' : '<span class="badge missing">缺文件</span>'}
                            ${book.has_description ? '<span class="badge ok">有简介</span>' : '<span class="badge missing">缺简介</span>'}
                            ${book.has_tags ? '<span class="badge ok">有标签</span>' : '<span class="badge missing">缺标签</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function selectAll(category) {
            const checkboxes = document.querySelectorAll(`input[type="checkbox"][data-category="${category}"]`);
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => cb.checked = !allChecked);
        }
        
        async function importSelected(action) {
            const categoryMap = {
                'import_new': 'new',
                'update_incomplete': 'incomplete',
                'remove_orphaned': 'orphaned'
            };
            
            const category = categoryMap[action];
            const checkboxes = document.querySelectorAll(`input[type="checkbox"][data-category="${category}"]:checked`);
            const ids = Array.from(checkboxes).map(cb => parseInt(cb.dataset.id));
            
            if (ids.length === 0) {
                alert('请先选择要处理的书籍');
                return;
            }
            
            const confirmMessages = {
                'import_new': `确定要导入 ${ids.length} 本书籍吗？`,
                'update_incomplete': `确定要更新 ${ids.length} 本书籍吗？`,
                'remove_orphaned': `确定要删除 ${ids.length} 本书籍吗？此操作不可恢复！`
            };
            
            if (!confirm(confirmMessages[action])) {
                return;
            }
            
            try {
                const response = await fetch('/api/calibre/import-selected', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: action,
                        book_ids: ids
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('操作已启动！请稍后刷新页面查看结果。');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    alert('操作失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('操作失败: ' + error.message);
            }
        }
        
        // 返回仪表板
        function goBack() {
            window.location.href = '/dashboard';
        }
        
        // 页面加载时自动分析
        loadDiff();
    </script>
</body>
</html>
